# This workflow will do a clean install of node dependencies, build the source code and run tests

name: 'SEO'

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-production:
    name: 'Generate SEO files'
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - environment: production-01
            host: SSH_HOST_PRODUCTION_01
          - environment: production-02
            host: SSH_HOST_PRODUCTION_02
          - environment: production-03
            host: SSH_HOST_PRODUCTION_03
    steps:
      - uses: actions/checkout@v3

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh/
          echo "$SSH_PRIVATE_KEY" > ./deploy.key
          sudo chmod 600 ./deploy.key
          ssh-keyscan -H $SSH_HOST >> ~/.ssh/known_hosts
        shell: bash
        env:
          SSH_PRIVATE_KEY: ${{secrets.SSH_MACHINE_USER_PRIVATE_KEY}}
          SSH_HOST: ${{ secrets[matrix.host] }}

      - name: Deploy to production
        run: ssh -v -i ./deploy.key www-data@$SSH_HOST '/opt/docker/app/sitemap/deploy.sh >> /var/log/cron_build_sitemap'
        env:
          SSH_HOST: ${{ secrets[matrix.host] }}

      - name: Notify failure
        if: failure()
        uses: annuaire-entreprises-data-gouv-fr/github-actions/.github/actions/notify@v1.1
        with:
          message: "🚨 Fichiers <strong>SEO</strong> non déployés sur <strong>${{ matrix.environment }}</strong> !"
          tchap-url: ${{ secrets.TCHAP_URL }}
          tchap-token: ${{ secrets.TCHAP_TOKEN }}
          trigger-notification: true
      - name: Notify success
        if: success()
        uses: annuaire-entreprises-data-gouv-fr/github-actions/.github/actions/notify@v1.1
        with:
          message: "✅ Fichiers <strong>SEO</strong> déployés sur <strong>${{ matrix.environment }}</strong>"
          tchap-url: ${{ secrets.TCHAP_URL }}
          tchap-token: ${{ secrets.TCHAP_TOKEN }}
          trigger-notification: false
